<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCI Madrid | Solicitudes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: "Poppins", sans-serif;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at 20% 20%, #102a54, #030c1d 70%);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
}

/* Glow azul de fondo */
body::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(37,99,235,0.25), transparent 70%);
  top: -150px;
  right: -150px;
  z-index: 0;
}

/* Animación moderna */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(40px) scale(0.97);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.card {
  position: relative;
  z-index: 1;
  width: 95%;
  max-width: 560px;
  padding: 50px 45px;
  border-radius: 28px;
  background: rgba(18, 32, 60, 0.55);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 40px 100px rgba(0,0,0,0.85);
  animation: fadeUp 0.8s ease forwards;
}

/* Header */
.header {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 25px;
}

.header img {
  width: 70px;
  margin-bottom: 15px;
}

.header h1 {
  font-size: 1.8rem;
  letter-spacing: 3px;
  font-weight: 700;
  text-align: center;
}

/* Descripción */
.description {
  text-align: center;
  font-size: 0.9rem;
  opacity: 0.85;
  line-height: 1.5;
  margin-bottom: 35px;
}

/* Labels */
label {
  font-size: 0.8rem;
  opacity: 0.85;
  font-weight: 500;
}

/* Inputs */
input, select, textarea {
  width: 100%;
  padding: 15px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.06);
  color: white;
  margin-top: 8px;
  margin-bottom: 22px;
  font-size: 0.9rem;
  outline: none;
  transition: all 0.3s ease;
}

input::placeholder,
textarea::placeholder {
  color: rgba(255,255,255,0.6);
}

input:focus,
select:focus,
textarea:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 4px rgba(59,130,246,0.3);
  background: rgba(255,255,255,0.1);
}

/* Textarea */
textarea {
  min-height: 140px;
  resize: vertical;
}

/* Botón */
button {
  width: 100%;
  padding: 16px;
  border-radius: 18px;
  border: none;
  font-weight: 600;
  font-size: 0.95rem;
  letter-spacing: 1px;
  background: linear-gradient(135deg, #2563eb, #1e40af);
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover {
  transform: translateY(-4px);
  box-shadow: 0 25px 50px rgba(37,99,235,0.5);
}

button:active {
  transform: translateY(-2px);
}

/* Mensajes */
.message {
  margin-top: 15px;
  text-align: center;
  font-size: 0.85rem;
}

.success {
  color: #4ade80;
}

.error {
  color: #f87171;
}

/* Responsive */
@media (max-width: 600px) {
  .card {
    padding: 35px 25px;
  }
}

</style>
</head>
<body>

<div class="card">

  <div class="header">
    <img src="mcilogo.png" alt="MCI Madrid">
    <h1>SOLICITUD</h1>
  </div>

  <div class="description">
    ✔️ En este formulario puedes dejar tus solicitudes y consultas, como información sobre tu celugrama, ediciones de discípulos, transferencias entre líderes o cualquier inquietud general.<br><br>
    ⏳ Todas las solicitudes se revisarán el lunes siguiente a su envío.
  </div>

  <form id="solicitudForm">

    <label>Usuario *</label>
    <input type="number" name="usuario" required placeholder="Escriba su número de usuario">

    <label>Selecciona sobre qué es tu solicitud *</label>
    <select name="tipo" required>
      <option value="">Seleccione una opción</option>
      <option>Transferencia de Discípulos</option>
      <option>Celugrama</option>
      <option>Edición</option>
      <option>Borrar Discipulos</option>
      <option>Otro</option>
    </select>

    <label>Solicitud *</label>
    <textarea name="solicitud" required placeholder="Describe detalladamente tu solicitud e indica a qué persona(s) deseas realizar cambios, eliminaciones o consultas (discípulos, celugrama, transferencias, información, etc.)."></textarea>

    <button type="submit">ENVIAR SOLICITUD</button>

    <div id="mensaje" class="message"></div>

  </form>

</div>

<script>

const form = document.getElementById("solicitudForm");
const mensaje = document.getElementById("mensaje");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  mensaje.textContent = "Enviando solicitud...";
  mensaje.className = "message";

  const datos = {
    Usuario: form.usuario.value,
    "SELECCIONA SOBRE QUE ES TU SOLICITUD": form.tipo.value,
    Solicitud: form.solicitud.value
  };

  try {
    const response = await fetch("https://personal-n8n.yaf3an.easypanel.host/webhook/solicitudes", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(datos)
    });

    const resultado = await response.json();

    if (resultado.status === "ok") {
      mensaje.textContent = "✔️ Solicitud enviada correctamente.";
      mensaje.classList.add("success");
      form.reset();
    } else {
      mensaje.textContent = "❌ Ocurrió un problema.";
      mensaje.classList.add("error");
    }

  } catch (error) {
    mensaje.textContent = "❌ Error de conexión con el servidor.";
    mensaje.classList.add("error");
  }

});

</script>

</body>
</html>
