<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCI Madrid | Solicitudes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: "Poppins", sans-serif;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at top left, #0b1a35, #030c1d 70%);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* Animación elegante */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(40px) scale(0.98);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.card {
  width: 95%;
  max-width: 520px;
  padding: 45px 40px;
  border-radius: 24px;
  background: rgba(18, 32, 60, 0.65);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 30px 90px rgba(0,0,0,0.85);
  animation: fadeUp 0.9s ease forwards;
}

/* Header con logo */
.header {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 30px;
}

.header img {
  width: 60px;
  height: auto;
}

.title-group h1 {
  font-size: 1.6rem;
  letter-spacing: 2px;
}

.title-group p {
  font-size: 0.75rem;
  opacity: 0.6;
}

/* Descripción */
.description {
  font-size: 0.85rem;
  opacity: 0.8;
  margin-bottom: 25px;
  line-height: 1.4;
}

/* Formulario */

label {
  font-size: 0.8rem;
  opacity: 0.85;
}

input, select, textarea {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.08);
  color: white;
  margin-top: 6px;
  margin-bottom: 20px;
  font-size: 0.9rem;
  outline: none;
  transition: all 0.3s ease;
}

input::placeholder,
textarea::placeholder {
  color: rgba(255,255,255,0.6);
}

input:focus,
select:focus,
textarea:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.35);
  background: rgba(255,255,255,0.12);
}

textarea {
  min-height: 120px;
  resize: vertical;
}

/* Botón premium */

button {
  width: 100%;
  padding: 15px;
  border-radius: 16px;
  border: none;
  font-weight: 600;
  font-size: 0.95rem;
  letter-spacing: 1px;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 20px 45px rgba(37,99,235,0.45);
}

button:active {
  transform: translateY(-1px);
}

/* Mensajes */

.message {
  margin-top: 15px;
  text-align: center;
  font-size: 0.85rem;
}

.success {
  color: #4ade80;
}

.error {
  color: #f87171;
}

/* Responsive */

@media (max-width: 600px) {
  .card {
    padding: 35px 25px;
  }

  .header img {
    width: 50px;
  }

  .title-group h1 {
    font-size: 1.3rem;
  }
}

</style>
</head>
<body>

<div class="card">

  <div class="header">
    <img src="mci-logo.png" alt="MCI Madrid">
    <div class="title-group">
      <h1>SOLICITUD</h1>
      <p>Gestión interna de solicitudes</p>
    </div>
  </div>

  <div class="description">
    ✔️ Aquí puedes dejar tus solicitudes y consultas.<br>
    ⏳ Se revisarán el lunes siguiente a su envío.
  </div>

  <form id="solicitudForm">

    <label>Usuario *</label>
    <input type="number" name="usuario" required placeholder="Escriba su número de usuario">

    <label>Selecciona sobre qué es tu solicitud *</label>
    <select name="tipo" required>
      <option value="">Seleccione una opción</option>
      <option>Transferencia de Discípulos</option>
      <option>Celugrama</option>
      <option>Edición</option>
      <option>Borrar Discipulos</option>
      <option>Otro</option>
    </select>

    <label>Solicitud *</label>
    <textarea name="solicitud" required placeholder="Describe detalladamente tu solicitud..."></textarea>

    <button type="submit">ENVIAR SOLICITUD</button>

    <div id="mensaje" class="message"></div>

  </form>

</div>

<script>

const form = document.getElementById("solicitudForm");
const mensaje = document.getElementById("mensaje");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  mensaje.textContent = "Enviando solicitud...";
  mensaje.className = "message";

  const datos = {
    Usuario: form.usuario.value,
    "SELECCIONA SOBRE QUE ES TU SOLICITUD": form.tipo.value,
    Solicitud: form.solicitud.value
  };

  try {
    const response = await fetch("https://personal-n8n.yaf3an.easypanel.host/webhook/solicitudes", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(datos)
    });

    const resultado = await response.json();

    if (resultado.status === "ok") {
      mensaje.textContent = "✔️ Solicitud enviada correctamente.";
      mensaje.classList.add("success");
      form.reset();
    } else {
      mensaje.textContent = "❌ Ocurrió un problema.";
      mensaje.classList.add("error");
    }

  } catch (error) {
    mensaje.textContent = "❌ Error de conexión con el servidor.";
    mensaje.classList.add("error");
  }

});

</script>

</body>
</html>
