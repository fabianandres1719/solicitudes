<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitud Enviada | MCI Madrid</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at 30% 20%, #102a54, #030c1d 70%);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  padding: 20px;
}

.card {
  width: 100%;
  max-width: 550px;
  padding: 60px 40px;
  border-radius: 30px;
  background: rgba(18, 32, 60, 0.55);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 40px 100px rgba(0,0,0,0.8);
  text-align: center;
  animation: fadeUp 0.8s ease forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

img {
  width: 80px;
  margin-bottom: 20px;
}

h1 {
  font-size: 1.8rem;
  margin-bottom: 20px;
  color: #4ade80;
}

p {
  font-size: 1rem;
  opacity: 0.85;
  margin-bottom: 30px;
  line-height: 1.6;
}

button {
  padding: 14px 30px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(135deg, #2563eb, #1e40af);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s ease;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 20px 40px rgba(37,99,235,0.4);
}

</style>
</head>
<body>

<div class="card">
  <img src="mcilogo.png" alt="MCI Madrid">
  <h1>✔️ Solicitud Creada</h1>
  <p>
    Tu solicitud fue creada satisfactoriamente.<br>
    Será revisada el próximo lunes y procesada por el equipo correspondiente.
  </p>

  <button onclick="window.location.href='/'">
    Crear Nueva Solicitud
  </button>
</div>

</body>
</html>
